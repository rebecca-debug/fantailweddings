<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Fantail Weddings | Boutique Wedding Planning</title>
		<!-- Preconnect to Google Fonts + preload the LCP hero image -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link rel="preload" as="image" href="/assets/images/Welcome-Hero.webp" fetchpriority="high">
		<!-- Load fonts without blocking render (swap in when ready) -->
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Inter:wght@200;300;400;500;600&display=swap" media="print" onload="this.media='all'">
		<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Inter:wght@200;300;400;500;600&display=swap"></noscript>
	</head>
	<body>
		<!-- Hidden static form so Netlify detects the "contact" form at build time (the visible
		     form is React-rendered and submits to it via AJAX). Field names mirror the live form. -->
		<form name="contact" netlify netlify-honeypot="bot-field" hidden>
			<input type="text" name="bot-field" />
			<input type="text" name="subject" />
			<input type="text" name="names" />
			<input type="email" name="email" />
			<input type="text" name="location" />
			<input type="text" name="helpType" />
			<input type="text" name="dateTiming" />
			<input type="text" name="guestCount" />
			<input type="text" name="regionDrawn" />
			<textarea name="story"></textarea>
			<input type="text" name="source" />
		</form>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
